<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- Agnes-AI-Web v40 - 全面升级 Markdown 渲染：表格/代码块/列表/引用/链接/标题/加粗/斜体/删除线/水平线，主题自适应，行距/列表优化 -->
<title>Agnes-AI-Web</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%236366f1'/></svg>">
<!-- PDF.js for binary file extraction -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>window.PDFJS_VERSION='3.11.174';if(typeof pdfjsLib!=='undefined'){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/'+window.PDFJS_VERSION+'/pdf.worker.min.js';}</script>
<!-- mammoth.js for docx extraction -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script><!-- SheetJS for xlsx extraction -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<!-- 默认亮色主题 -->
<script>document.documentElement.setAttribute('data-theme','light');</script>
<!-- __CONFIG__ -->
<style>
:root{
--bg:#0f1117;--bg-card:#1a1b23;--bg-input:#232430;--border:#2d2e3a;
--text:#e4e4e7;--text-dim:#8b8d9a;--primary:#6366f1;--primary-hover:#818cf8;
--primary-glow:rgba(99,102,241,.25);--success:#22c55e;--error:#ef4444;--accent:#0ea5e9;
--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.3);
}
[data-theme="light"]{
--bg:#f8f9fb;--bg-card:#fff;--bg-input:#f1f3f5;--border:#e2e4e9;
--text:#1a1b23;--text-dim:#6b6e7d;--primary:#4f46e5;--primary-hover:#6366f1;
--primary-glow:rgba(79,70,229,.18);--accent:#0284c7;--shadow:0 4px 24px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;min-height:100vh;transition:all .3s;-webkit-tap-highlight-color:transparent}
.container{max-width:1200px;margin:0 auto;padding:0 16px}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:24px;flex-wrap:wrap;gap:12px}
.logo{font-size:22px;font-weight:700;display:flex;align-items:center;gap:12px}
.logo .dot{width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
.header-actions{display:flex;align-items:center;gap:8px}
.btn-icon{padding:8px;border-radius:8px;background:transparent;color:var(--text-dim);border:1px solid var(--border);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.btn-icon:hover{color:var(--text);border-color:var(--text-dim);transform:scale(1.05)}

/* API Key Bar */
.api-key-bar{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding:16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);flex-wrap:wrap}
.api-key-bar label{font-size:14px;font-weight:600;white-space:nowrap;color:var(--text-dim)}
.api-key-bar input{flex:1;min-width:200px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:monospace}
.api-key-bar input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;min-height:42px;height:42px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover);box-shadow:0 0 20px var(--primary-glow)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost:disabled{opacity:.5;cursor:not-allowed}
.btn-accent:disabled{opacity:.5;cursor:not-allowed}
.btn:disabled{cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text-dim)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{filter:brightness(1.1)}

/* Get API Key Section */
.api-key-section{margin-bottom:24px;padding:16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.api-key-section span{font-size:13px;color:var(--text-dim)}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--bg-input);border-radius:var(--radius);padding:4px;margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:1;padding:12px;text-align:center;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;color:var(--text-dim);transition:all .2s;border:none;background:transparent;display:flex;align-items:center;justify-content:center;gap:8px;min-width:120px;white-space:nowrap}
.tab.active{background:var(--primary);color:#fff}
.tab:hover:not(.active){color:var(--text)}

/* Cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow);overflow:hidden}
label{display:block;font-size:13px;font-weight:500;color:var(--text-dim);margin-bottom:6px}
.input,.textarea,.select{width:100%;padding:10px 14px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;transition:all .2s;font-family:inherit}
.input:focus,.select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.textarea{resize:vertical;min-height:80px}
.select{cursor:pointer;appearance:none}

/* Form Grid */
.form-grid{display:grid;gap:16px}
.form-grid-2{grid-template-columns:1fr 1fr}
.form-grid-3{grid-template-columns:1fr 1fr 1fr}

/* Image Modes */
.img-modes{display:flex;gap:2px;background:var(--bg-input);border-radius:8px;padding:4px;margin-bottom:16px}
.img-mode{flex:1;padding:10px;text-align:center;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-dim);background:transparent;border:none;transition:all .2s}
.img-mode.active{background:var(--primary);color:#fff}

/* Video Modes */
.vid-modes{display:flex;gap:2px;background:var(--bg-input);border-radius:8px;padding:4px;margin-bottom:16px;flex-wrap:wrap}
.vid-mode{flex:1;min-width:100px;padding:10px;text-align:center;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-dim);background:transparent;border:none;transition:all .2s}
.vid-mode.active{background:var(--accent);color:#fff}

/* Gallery */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.gallery-item{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .2s;background:var(--bg-input)}
.gallery-item:hover{transform:scale(1.02)}
.gallery-item img,.gallery-item video{width:100%;height:100%;object-fit:cover;display:block}
.gallery-item .overlay{position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.7));opacity:0;transition:opacity .2s;display:flex;align-items:flex-end;justify-content:center;padding:12px;gap:8px}
[data-theme="light"] .gallery-item .overlay{background:linear-gradient(transparent 40%,rgba(0,0,0,.5))}
.gallery-item:hover .overlay{opacity:1}
.gallery-item .overlay button{padding:6px 12px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:var(--primary);color:#fff}
.gallery-item .badge{position:absolute;top:8px;left:8px;padding:4px 8px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(0,0,0,.6);color:#fff}
[data-theme="light"] .gallery-item .badge{background:rgba(255,255,255,.85);color:#1a1b23;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* Chat */
.chat-layout{display:flex;flex-direction:column;min-height:0;height:100%}
.chat-messages{min-height:320px;max-height:50vh;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;min-width:0}
@media(max-width:768px){
.chat-messages{min-height:280px;max-height:45vh}
}
@media(max-width:480px){
.chat-messages{min-height:240px;max-height:40vh}
}
.chat-msg{display:flex;gap:12px;max-width:85%;animation:fadeInUp .3s ease;min-width:0}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.chat-msg.user{align-self:flex-end;flex-direction:row-reverse}
.chat-msg.assistant{align-self:flex-start}
.chat-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;background:var(--bg-input);border:1px solid var(--border)}
.chat-msg.user .chat-avatar{background:var(--primary);border:none}
.chat-msg.assistant .chat-avatar{background:var(--accent);border:none}
.chat-bubble{padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;max-width:100%;min-width:0;transition:all .3s ease}
.chat-msg.user .chat-bubble{background:linear-gradient(135deg,var(--primary),var(--primary-hover));color:#fff;border-bottom-right-radius:6px;box-shadow:0 4px 12px var(--primary-glow)}
.chat-msg.assistant .chat-bubble{background:var(--bg-card);color:var(--text);border-bottom-left-radius:6px;border:1px solid var(--border);box-shadow:0 2px 8px var(--shadow)}
[data-theme="light"] .chat-msg.assistant .chat-bubble{background:#ffffff;box-shadow:0 2px 8px rgba(0,0,0,.06)}

/* === Markdown Rendering - Zero Indent Layout === */
/* All left-indent removed: code blocks, blockquotes, lists at all nesting levels */

/* Base reset - zero out browser defaults, add proper spacing */
.chat-msg.assistant .chat-bubble *{margin:0;padding:0}

/* Headers - tight spacing */
.chat-msg.assistant .chat-bubble h1{font-size:16px;font-weight:700;margin:6px 0 4px 0;line-height:1.3;color:#e4e4e7}
.chat-msg.assistant .chat-bubble h2{font-size:15px;font-weight:700;margin:5px 0 3px 0;line-height:1.25;color:#e0e0e0}
.chat-msg.assistant .chat-bubble h3{font-size:14px;font-weight:600;margin:4px 0 3px 0;line-height:1.25;color:#d8d8d8}
.chat-msg.assistant .chat-bubble h4,.chat-msg.assistant .chat-bubble h5,.chat-msg.assistant .chat-bubble h6{font-size:13px;font-weight:600;margin:4px 0 2px 0;line-height:1.2;color:#d0d0d0}

/* Headers - Light theme */
[data-theme="light"] .chat-msg.assistant .chat-bubble h1{color:#1a1b23}
[data-theme="light"] .chat-msg.assistant .chat-bubble h2{color:#2d2e3a}
[data-theme="light"] .chat-msg.assistant .chat-bubble h3{color:#3d3e4a}
[data-theme="light"] .chat-msg.assistant .chat-bubble h4,[data-theme="light"] .chat-msg.assistant .chat-bubble h5,[data-theme="light"] .chat-msg.assistant .chat-bubble h6{color:#4d4e5a}

/* Paragraphs - uniform 4px bottom gap, line-height 1.5 */
.chat-msg.assistant .chat-bubble p{margin:0 0 6px 0;line-height:1.6;color:var(--text);font-size:13px;white-space:pre-wrap}
.chat-msg.assistant .chat-bubble p:last-child{margin-bottom:0}

.chat-msg.assistant .chat-bubble hr{border:none;height:2px;background:var(--border);margin:10px 0;border-radius:1px}

/* Code - Inline - neutral, theme-adaptive */
.chat-msg.assistant .chat-bubble code{background:var(--bg-input);color:var(--text);padding:1.5px 6px;border-radius:4px;font-size:12px;font-family:'Fira Code','Courier New',monospace;font-weight:500;border:1px solid var(--border)}

/* Code blocks - dark theme default */
.chat-msg.assistant .chat-bubble pre{background:#1e1e2e !important;padding:0;border-radius:0 !important;overflow-x:auto;margin:0}
.chat-msg.assistant .chat-bubble pre code{background:none;padding:12px 14px;color:#cdd6f4;font-size:12px;line-height:1.6;font-family:'Fira Code','Cascadia Code','JetBrains Mono','Courier New',monospace;white-space:pre;display:block}
.code-block-wrapper{position:relative;margin:6px 0;border-radius:8px;border:1px solid #313244;overflow:hidden;background:#1e1e2e}
.code-block-wrapper .code-header{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;background:#181825;border-bottom:1px solid #313244}
.code-block-wrapper .code-lang{font-size:11px;color:#a6adc8;font-weight:600;text-transform:capitalize}
.code-block-wrapper .code-actions{display:flex;gap:4px;align-items:center}
.code-block-wrapper .code-action-btn{background:none;border:none;color:#89b4fa;cursor:pointer;padding:2px 6px;border-radius:4px;font-size:11px;display:flex;align-items:center;gap:3px;transition:all .2s}
.code-block-wrapper .code-action-btn:hover{background:rgba(137,180,250,.15);color:#cba6f7}
.code-block-wrapper .code-action-btn svg{width:12px;height:12px}
.code-block-wrapper pre{margin:0;padding:12px 14px;background:#1e1e2e !important;border-radius:0 !important;overflow-x:auto}
.code-block-wrapper pre code{display:block;background:none !important;padding:0;color:#cdd6f4;font-size:12px;line-height:1.6;font-family:'Fira Code','Cascadia Code','JetBrains Mono','Courier New',monospace;white-space:pre!important}

/* Code blocks - light theme */
[data-theme="light"] .chat-msg.assistant .chat-bubble pre{background:#f6f8fa !important}
[data-theme="light"] .chat-msg.assistant .chat-bubble pre code{color:#24292f}
[data-theme="light"] .code-block-wrapper{background:#f6f8fa;border-color:#d0d7de}
[data-theme="light"] .code-block-wrapper .code-header{background:#e1e4e8;border-bottom-color:#d0d7e4}
[data-theme="light"] .code-block-wrapper .code-lang{color:#656d76}
[data-theme="light"] .code-block-wrapper .code-action-btn{color:#6e7781}
[data-theme="light"] .code-block-wrapper .code-action-btn:hover{background:rgba(100,116,139,.12);color:#0969da}
[data-theme="light"] .code-block-wrapper pre{background:#f6f8fa !important}
[data-theme="light"] .code-block-wrapper pre code{color:#24292f;white-space:pre!important}

/* Blockquote - neutral, theme-adaptive */
.chat-msg.assistant .chat-bubble blockquote{border-left:3px solid var(--border);padding:4px 10px;margin:6px 0;background:var(--bg-input);border-radius:0 4px 4px 0;color:var(--text-dim);font-style:italic;font-size:12.5px;line-height:1.6}

/* Links */
.chat-msg.assistant .chat-bubble a{color:var(--primary-hover);text-decoration:none;border-bottom:1px dashed var(--primary-hover);transition:all .2s}
.chat-msg.assistant .chat-bubble a:hover{color:var(--primary);border-bottom-color:var(--primary)}
[data-theme="light"] .chat-msg.assistant .chat-bubble a{color:var(--primary)}

/* Images - no vertical gap, inline */
.chat-msg.assistant .chat-bubble img{max-width:100%;border-radius:4px;margin:0;display:inline-block;box-shadow:0 1px 4px rgba(0,0,0,.1);border:1px solid var(--border)}
[data-theme="light"] .chat-msg.assistant .chat-bubble img{box-shadow:0 1px 4px rgba(0,0,0,.06)}

/* Lists - markers inside, relaxed spacing, left padding for text */
.chat-msg.assistant .chat-bubble ul,.chat-msg.assistant .chat-bubble ol{margin:4px 0;padding-left:20px !important;line-height:1.4;list-style-position:outside}
.chat-msg.assistant .chat-bubble li{margin:0;line-height:1.5;font-size:13px;padding:1px 0 1px 4px;display:list-item}
.chat-msg.assistant .chat-bubble ul li{list-style-type:disc}
.chat-msg.assistant .chat-bubble li::marker{color:var(--primary);font-weight:600}

/* Nested lists */
.chat-msg.assistant .chat-bubble ul ul,.chat-msg.assistant .chat-bubble ol ol,.chat-msg.assistant .chat-bubble ul ol,.chat-msg.assistant .chat-bubble ol ul{margin:2px 0;padding-left:20px}

/* Tables - neutral, theme-adaptive */
.chat-msg.assistant .chat-bubble table{border-collapse:collapse;width:100%;margin:6px 0;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.chat-msg.assistant .chat-bubble th,.chat-msg.assistant .chat-bubble td{border:1px solid var(--border);padding:6px 10px;text-align:left;font-size:12.5px;line-height:1.5}
.chat-msg.assistant .chat-bubble th{background:var(--bg-input);font-weight:600;color:var(--text)}
.chat-msg.assistant .chat-bubble td{color:var(--text)}
.chat-msg.assistant .chat-bubble tr:nth-child(even){background:var(--bg-input)}

/* Bold, italic, strikethrough - subtle, theme-adaptive */
.chat-msg.assistant .chat-bubble strong{font-weight:700;color:var(--text)}
.chat-msg.assistant .chat-bubble em{font-style:italic}
.chat-msg.assistant .chat-bubble del{color:var(--text-dim);text-decoration:line-through;text-decoration-color:var(--text-dim)}
.chat-cursor{display:inline-block;width:2px;height:16px;background:var(--primary);margin-left:2px;animation:blink .8s infinite}
@keyframes blink{0%,50%{opacity:1;}51%,100%{opacity:0;}}
.thinking-dots span{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--primary);margin:0 2px;animation:bounce .6s infinite alternate}
.thinking-dots span:nth-child(2){animation-delay:.2s}
.thinking-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{from{transform:translateY(0);opacity:.4;}to{transform:translateY(-6px);opacity:1;}}
.chat-msg-footer{display:flex;gap:6px;margin-top:4px}
.chat-msg-footer button{background:none;border:1px solid transparent;color:var(--text-dim);cursor:pointer;padding:2px 8px;border-radius:4px;font-size:11px;transition:all .2s;display:inline-flex;align-items:center;gap:3px}
.chat-msg-footer button:hover{color:var(--text);border-color:var(--border)}
.chat-send svg{width:20px;height:20px}
.chat-input-area{display:flex;gap:10px;flex-shrink:0;align-items:stretch;position:relative}
.input-wrap{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-attachments{display:flex;gap:8px;flex-wrap:wrap;padding:6px 6px 0}
.chat-attachment{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-dim)}
.chat-attachment .remove{cursor:pointer;color:var(--error);font-weight:700;margin-left:4px}
.input-card{border:1px solid var(--border);border-radius:12px;background:var(--bg-card);display:flex;flex-direction:column;overflow:hidden;transition:border-color .2s ease, box-shadow .2s ease}
.input-card:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.input-body{padding:8px 12px 0}
.input-body .textarea{width:100%;border:none;background:transparent;color:var(--text);font-size:14px;font-family:inherit;resize:none;outline:none;overflow-y:auto;display:block;box-sizing:border-box;min-height:42px;max-height:108px;flex:1;word-break:break-all;overflow-wrap:break-word;white-space:pre-wrap;line-height:1.5}
.input-body .textarea:focus{outline:none}
.input-body .textarea::placeholder{color:var(--text-dim)}
.input-footer{display:flex;justify-content:space-between;align-items:center;padding:4px 10px 8px;gap:8px}
.input-left,.input-right{display:flex;gap:4px;align-items:center}
.btn-icon{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:6px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;transition:all .2s}
.btn-icon:hover{color:var(--text);background:var(--bg-card)}
.btn-icon svg{width:16px;height:16px}
.chat-send{background:var(--primary)!important;color:#fff!important;border:none!important;padding:8px 14px!important;border-radius:8px!important;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:6px;flex-shrink:0;cursor:pointer;transition:all .2s}
.chat-send:hover{opacity:.9}
/* Progress */
.progress-bar{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:12px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .3s;width:0}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.success{background:var(--success);color:#fff}
.toast.error{background:var(--error);color:#fff}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
[data-theme="light"] .modal-overlay{background:rgba(0,0,0,.3)}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:28px;position:relative;box-shadow:var(--shadow)}
.modal h2{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:14px}
[data-theme="light"] .empty svg{opacity:.15;filter:grayscale(1) invert(1)}
.empty svg{margin-bottom:12px;opacity:.3}

/* Filter bar */
.history-tools{display:flex;justify-content:flex-end;margin-bottom:12px}
.history-tools .select{max-width:160px}

/* === Responsive: Small Phone (<480px) === */

}
.login-bg{position:fixed;inset:0;background:linear-gradient(135deg,#0f1117,#1a1b23);display:flex;align-items:center;justify-content:center;z-index:9999}
[data-theme="light"] .login-bg{background:linear-gradient(135deg,#f8f9fb,#e2e4e9)}
.login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center;width:90%;max-width:360px;box-shadow:0 8px 48px rgba(0,0,0,.4)}
.login-card h2{font-size:20px;margin-bottom:24px;font-weight:700}
.login-input{width:100%;padding:12px 16px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;margin-bottom:16px;box-sizing:border-box}
.login-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.login-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.login-btn:hover{background:var(--primary-hover)}
.login-error{margin-top:12px;font-size:13px;color:var(--error)}

/* Watermark for default API key */
.default-key-banner{display:none;margin-bottom:24px;padding:10px 16px;background:linear-gradient(90deg,rgba(99,102,241,.1),rgba(14,165,233,.1));border:1px solid var(--border);text-align:center;font-size:13px;color:var(--text-dim)}
</style>
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay" style="display:none">
<div class="login-bg">
<div class="login-card">
<h2>🔐 输入访问密码</h2>
<input type="password" id="loginPassword" placeholder="请输入访问密码..." class="login-input">
<button class="login-btn" id="loginBtn">进入</button>
<p id="loginError" class="login-error" style="display:none">密码错误，请重试</p>
</div>
</div>
</div>

<div class="container">
<header>
<div class="logo"><div class="dot"></div>Agnes-AI-Web</div>
<div class="header-actions">
<a class="btn-icon" href="https://github.com/cxyqiyue/Agnes-AI-Web" target="_blank" rel="noopener noreferrer" title="GitHub 仓库" aria-label="GitHub 仓库">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.5v-1.7c-2.78.6-3.37-1.18-3.37-1.18-.46-1.18-1.11-1.5-1.11-1.5-.91-.62.07-.61.07-.61 1 .07 1.53 1.04 1.53 1.04.89 1.53 2.33 1.09 2.9.83.09-.65.35-1.09.63-1.34-2.22-.25-4.56-1.11-4.56-4.95 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.26.1-2.61 0 0 .84-.27 2.75 1.03a9.5 9.5 0 0 1 5 0c1.9-1.3 2.74-1.03 2.74-1.03.55 1.35.2 2.36.1 2.61.64.7 1.03 1.59 1.03 2.68 0 3.85-2.34 4.7-4.57 4.94.36.32.68.95.68 1.92v2.84c0 .28.18.59.69.5A10 10 0 0 0 12 2z"/></svg>
</a>
<button class="btn-icon" id="themeToggle" title="切换主题">
<svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
<svg id="moonIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>
<button class="btn-icon" id="settingsBtn" title="高级设置">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1.82-.33"/></svg>
</button>
</div>
</header>

<!-- API Key Section -->
<div class="api-key-section">
<span>💡 还没有 API Key？</span>
<button class="btn btn-accent" id="getApiKeyBtn" style="flex:1">🚀 一键注册获取 API Key</button>
</div>

<div class="privacy-note" style="font-size:12px;line-height:1.6;color:var(--text-dim);margin-bottom:16px;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px">
🔒 隐私说明：所有配置与生成记录（API Key、端点、模型、图片/视频/对话结果等）仅保存在你的浏览器本地 localStorage 中，不会上传到本项目服务器。生成请求会直接发送到你配置的 Agnes AI API 端点。
</div>

<div class="api-key-bar">
<label>API Key</label>
<input type="password" id="apiKeyInput" placeholder="输入你的 Agnes AI API Key...">
<button class="btn btn-primary" id="pasteKeyBtn" title="粘贴 API Key" style="background:var(--accent)">粘贴</button>
<button class="btn btn-primary" id="saveKeyBtn">保存</button>
</div>

<!-- Main Tabs: Chat → Image → Video -->
<div class="tabs">
<button class="tab active" data-tab="chat"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> <span class="tab-text">文本对话</span></button>
<button class="tab" data-tab="image"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg> <span class="tab-text">图片生成</span></button>
<button class="tab" data-tab="video"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg> <span class="tab-text">视频生成</span></button>
</div>

<!-- Chat Panel (Left/First) -->
<div id="chatPanel">
<div class="card">
<div class="chat-layout">
<div class="chat-messages" id="chatMessages">
<div class="empty" id="chatEmpty">
<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
<p>开始与 Agnes AI 对话</p>
</div>
</div>
<div class="chat-input-area">
<div class="input-wrap">
<div class="input-card">
<div class="chat-attachments" id="chatAttachments"></div>
<div class="input-body">
<textarea class="textarea" id="chatInput" rows="1" placeholder="输入消息... 支持发送文本、图片、文件"></textarea>
</div>
<div class="input-footer">
<div class="input-left">
<button class="btn-icon" id="chatPaste" title="从剪贴板粘贴"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg></button>
<button class="btn-icon" id="chatAttachFile" title="上传文件"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
<button class="btn-icon" id="chatAttachImage" title="上传图片"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></button>
<input type="file" id="chatFileInput" style="display:none" accept="*/*">
<input type="file" id="chatImageInput" style="display:none" accept="image/*">
</div>
<div class="input-right">
<button class="btn-icon" id="chatClear" title="清空对话"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
<button class="chat-send" id="chatSend"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
</div>
</div>
</div>
</div>
</div>
</div>
</div>

<!-- Image Panel (Middle/Second) -->
<div id="imagePanel" style="display:none">
<div class="card">
<div class="img-modes">
<button class="img-mode active" data-imgmode="txt2img">文生图</button>
<button class="img-mode" data-imgmode="img2img">图生图</button>
</div>
<div id="img2imgUpload" style="display:none">
<label>参考图 URL</label>
<input class="input" id="imgRefUrl" placeholder="https://example.com/reference.png">
</div>
<label>提示词</label>
<textarea class="textarea" id="imgPrompt" rows="3" placeholder="一座发光的浮空城市漂浮在薄雾笼罩的峡谷之上，日出时分，电影级写实风格..."></textarea>
<div class="form-grid" style="margin-top:12px">
<div><label>尺寸</label><select class="select" id="imgSize">
<option value="1024x1024">1024 x 1024</option>
<option value="1024x768" selected>1024 x 768</option>
<option value="768x1024">768 x 1024</option>
<option value="1024x1792">1024 x 1792</option>
<option value="1792x1024">1792 x 1024</option>
<option value="512x512">512 x 512</option>
</select></div>
</div>
<div style="margin-top:16px;display:flex;gap:10px;align-items:center">
<button class="btn btn-primary" id="imgGenerate"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>生成</button>
<span id="imgStatus" style="font-size:13px;color:var(--text-dim)"></span>
</div>
<div class="progress-bar" id="imgProgress" style="display:none"><div class="progress-fill"></div></div>
</div>
<div class="history-tools"><select class="select" id="imgFilter"><option value="all">全部图片</option><option value="T2I">文生图</option><option value="I2I">图生图</option></select></div>
<div id="imgGallery"></div>
</div>

<!-- Video Panel (Right/Third) -->
<div id="videoPanel" style="display:none">
<div class="card">
<div class="vid-modes">
<button class="vid-mode active" data-vidmode="txt2vid">文生视频</button>
<button class="vid-mode" data-vidmode="img2vid">图生视频</button>
<button class="vid-mode" data-vidmode="multi">多图参考</button>
<button class="vid-mode" data-vidmode="keyframe">关键帧</button>
</div>
<div id="vidImgUpload" style="display:none">
<label>参考图 URL（每行一个）</label>
<textarea class="textarea" id="vidRefUrls" rows="2" placeholder="https://example.com/reference.png"></textarea>
</div>
<label>提示词</label>
<textarea class="textarea" id="vidPrompt" rows="3" placeholder="一只猫在日落时分的海滩上散步，电影级镜头，柔和海浪，温暖金色光线，写实风格..."></textarea>
<div class="form-grid form-grid-3" style="margin-top:12px">
<div><label>分辨率</label><select class="select" id="vidSize">
<option value="1152x768" selected>1152 x 768</option>
<option value="1280x720">1280 x 720</option>
<option value="1920x1080">1920 x 1080</option>
<option value="768x1152">768 x 1152</option>
<option value="720x1280">720 x 1280</option>
</select></div>
<div><label>帧数</label><select class="select" id="vidFrames"></select></div>
<div><label>帧率</label><select class="select" id="vidFps">
<option value="16">16</option>
<option value="24" selected>24</option>
<option value="30">30</option>
</select></div>
</div>
<div style="margin-top:16px;display:flex;gap:10px;align-items:center">
<button class="btn btn-primary" id="vidGenerate"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>生成</button>
<span id="vidStatus" style="font-size:13px;color:var(--text-dim)"></span>
</div>
<div class="progress-bar" id="vidProgress" style="display:none"><div class="progress-fill"></div></div>
</div>
<div class="history-tools"><select class="select" id="vidFilter"><option value="all">全部视频</option><option value="txt2vid">文生视频</option><option value="img2vid">图生视频</option><option value="multi">多图参考</option><option value="keyframe">关键帧</option><option value="resume">恢复任务</option></select></div>
<div id="vidGallery"></div>
</div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">

// API Fetch with timeout
function apiFetch(targetUrl,opts,timeoutMs){
var requestOpts={method:opts&&opts.method||"POST",headers:opts&&opts.headers||{},body:opts&&opts.body};
var ctrl=new AbortController();
requestOpts.signal=ctrl.signal;
var timer=setTimeout(function(){ctrl.abort();},timeoutMs||180000);
return fetch(targetUrl,requestOpts).catch(function(e){if(e.name==="AbortError")throw new Error("请求超时，请稍后重试");throw e;}).finally(function(){clearTimeout(timer);});
}

function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function mdToHtml(md) {
    if (!md) return '';
    var html = md;
    html = html.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    var ph = {}; var pi = 0;

    // Step 1: Protect code blocks
    html = html.replace(/```(\w*)\s*\n?([\s\S]*?)```/g, function(m, lang, code) {
        var k = '\x00' + (pi++) + '\x00';
        var codeId = 'code-' + pi;
        var cleanedCode = code.replace(/\n+$/, '');
        var langLabel = lang || 'Code';
        var escapedLang = escapeHtml(langLabel);
        var safeCode = escapeHtml(cleanedCode);
        ph[k] = '<div class="code-block-wrapper" data-codeid="' + codeId + '"><div class="code-header"><span class="code-lang">' + escapedLang + '</span><div class="code-actions"><button class="code-action-btn" data-action="toggle" title="展开/收起"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button><button class="code-action-btn" data-action="copy" title="复制代码"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div></div><pre class="code-block" id="' + codeId + '"><code>' + safeCode + '</code></pre></div>';
        return k;
    });

    // Step 2: Protect tables
    html = html.replace(/^( *\|.+\| *)\n( *[-|:\s]+ *\n)((?: *\|.+\| * *\n?)*)/gm, function(m, hr, sr, br) {
        var k = '\x00' + (pi++) + '\x00';
        var hs = hr.split('|').map(function(h){return h.trim();}).filter(function(h){return h;});
        var rs = br.trim().split('\n').map(function(r){return r.split('|').map(function(c){return c.trim();}).filter(function(c){return c;});});
        function cf(t){return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');}
        var ths='';for(var i=0;i<hs.length;i++)ths+='<th>'+cf(hs[i])+'</th>';
        var tb='';for(var r=0;r<rs.length;r++){var tr='<tr>';for(var c=0;c<rs[r].length;c++)tr+='<td>'+cf(rs[r][c])+'</td>';tr+='</tr>';tb+=tr;}
        ph[k]='\n<table><thead><tr>'+ths+'</tr></thead><tbody>'+tb+'</tbody></table>\n';
        return k;
    });

    // Step 3: Protect inline code
    html = html.replace(/`([^`\n]+)`/g, function(m,code){
        var k='\x00'+(pi++)+'\x00';
        ph[k]='<code>'+escapeHtml(code)+'</code>';
        return k;
    });

    // Step 4: Headings
    var hf=function(t){return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');};
    html=html.replace(/^###### (.+)/gm,function(m,t){return'<h6>'+hf(t)+'</h6>';});
    html=html.replace(/^##### (.+)/gm,function(m,t){return'<h5>'+hf(t)+'</h5>';});
    html=html.replace(/^#### (.+)/gm,function(m,t){return'<h4>'+hf(t)+'</h4>';});
    html=html.replace(/^### (.+)/gm,function(m,t){return'<h3>'+hf(t)+'</h3>';});
    html=html.replace(/^## (.+)/gm,function(m,t){return'<h2>'+hf(t)+'</h2>';});
    html=html.replace(/^# (.+)/gm,function(m,t){return'<h1>'+hf(t)+'</h1>';});
    html=html.replace(/^ {0,3}---+$/gm,'<hr>');
    html=html.replace(/^ {0,3}\*\*\*+$/gm,'<hr>');
    html=html.replace(/^ {0,3}___+$/gm,'<hr>');
    html=html.replace(/^> ?(.+)/gm,function(m,c){return'<blockquote>'+c.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>')+'</blockquote>';});

    // Step 5: Lists - mark items
    var lr=[];
    var al=html.split('\n');
    for(var i=0;i<al.length;i++){
        var p=al[i];
        var ul=al[i].match(/^ {0,3}[-*+] (.+)$/);
        var ol=al[i].match(/^ {0,3}(\d+)\. (.+)$/);
        if(ul){
            var matched=al[i];
            if(/^\* \*\*/.test(matched)){p=al[i];}
            else if(/^\* \[/.test(matched)){p=al[i];}
            else{
                var uc=ul[1].replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/~~(.+?)~~/g,'<del>$1</del>');
                p='<ulitem>'+uc+'</ulitem>';
            }
        }else if(ol){
            var oc=ol[2].replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/~~(.+?)~~/g,'<del>$1</del>');
            p='<olitem>'+oc+'</olitem>';
        }
        lr.push(p);
    }
    html=lr.join('\n');

    // Step 6: Group list items into <ul>/<ol> blocks
    var grp=[];
    var il=html.split('\n');
    var inList=false, curType='', curItems=[];
    function flushList(){
        if(curItems.length>0){
            var inner=curItems.join('\n').replace(/<\/?(ul|ol)item>/g,function(t){
                return t.indexOf('<ulitem')===0?'<li>':'</li>';
            });
            if(curType==='ul'){
                grp.push('<ul>'+inner+'</ul>');
            }else{
                grp.push('<ol>'+inner+'</ol>');
            }
        }
        inList=false; curType=''; curItems=[];
    }
    for(i=0;i<il.length;i++){
        var ln=il[i];
        var isUl=ln.indexOf('<ulitem')===0;
        var isOl=ln.indexOf('<olitem')===0;
        if(isUl||isOl){
            var lt=isUl?'ul':'ol';
            if(inList && lt!==curType){
                // Type change - flush old list
                flushList();
            }
            inList=true; curType=lt; curItems.push(ln);
        }else if(ln.trim()===''){
            // Empty line - end current list
            flushList();
        }else{
            // Non-empty, non-list line
            flushList();
            grp.push(ln);
        }
    }
    flushList();
    html=grp.join('\n');

    // Step 7: Inline formatting
    html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    html=html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g,'<em>$1</em>');
    html=html.replace(/~~(.+?)~~/g,'<del>$1</del>');
    html=html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    html=html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');

    // Step 8: Restore placeholders
    for(var k in ph)html=html.replace(new RegExp(k,'g'),ph[k]);

    // Step 9: Paragraphs - join text lines with <br>, separate block elements
    var bl=html.split('\n');
    var out=[],cp=[];
    var btags=['pre','table','blockquote','h1','h2','h3','h4','h5','h6','ul','ol','hr','div'];
    function isOpenTag(l){var t=l.trim();if(!t)return false;for(var bi=0;bi<btags.length;bi++){var r=new RegExp('^<'+btags[bi]+'[>\\s/]');if(r.test(t))return true;}return false;}
    function isCloseTag(l){var t=l.trim();if(!t)return false;return/^<\/.+>$/.test(t);}
    function flush(){if(cp.length>0){out.push('<p>'+cp.join('<br>')+'</p>');cp=[];}}
    for(i=0;i<bl.length;i++){
        var ln=bl[i],tr=ln.trim();
        if(!tr){flush();continue;}
        if(isOpenTag(ln)||isCloseTag(ln)){flush();out.push(ln);}
        else{cp.push(tr);}
    }
    flush();
    return out.join('\n');
}

// Typewriter effect
var typewriterTimer = null;
function typewriterEffect(bubbleEl, mdContent, callback) {
    if (typewriterTimer) clearInterval(typewriterTimer);
    var html = mdToHtml(mdContent);
    bubbleEl.innerHTML = '<span class="chat-cursor"></span>';
    var i = 0;
    var speed = 8;
    typewriterTimer = setInterval(function() {
        if (i < html.length) {
            if (html[i] === '<') {
                var end = html.indexOf('>', i);
                if (end !== -1) {
                    i = end + 1;
                } else {
                    i++;
                }
            } else {
                i++;
            }
            bubbleEl.innerHTML = html.substring(0, i) + '<span class="chat-cursor"></span>';
            var container = document.getElementById("chatMessages");
            container.scrollTop = container.scrollHeight;
        } else {
            clearInterval(typewriterTimer);
            typewriterTimer = null;
            bubbleEl.innerHTML = html;
            if (callback) callback();
        }
    }, speed);
}

function addChatMsg(role, content, isHtml) {
    var container = document.getElementById("chatMessages");
    var empty = document.getElementById("chatEmpty");
    if (empty) empty.style.display = "none";
    
    var msgDiv = document.createElement("div");
    msgDiv.className = "chat-msg " + role;
    
    var avatar = document.createElement("div");
    avatar.className = "chat-avatar";
    avatar.textContent = role === "user" ? "👤" : "🤖";
    
    var bubble = document.createElement("div");
    bubble.className = "chat-bubble";
    
    if (role === "assistant") {
        bubble.classList.add("md-rendered");
        if (isHtml) {
            bubble.innerHTML = content;
        } else {
            bubble.innerHTML = mdToHtml(content);
        }
    } else {
        if (isHtml) {
            bubble.innerHTML = content;
        } else {
            bubble.innerHTML = content.replace(/\n/g,'<br>');
        }
    }
    
    msgDiv.appendChild(avatar);
    msgDiv.appendChild(bubble);
    container.appendChild(msgDiv);
    
    // Add copy footer to assistant messages
    if (role === "assistant") {
        var footer = createCopyFooter(content);
        container.appendChild(footer);
    }
    
    container.scrollTop = container.scrollHeight;
    return bubble;
}

// Wait for all external libraries to load before allowing file processing
var libsLoaded = new Promise(function(resolve) {
    console.log('Checking for lib availability...');
    console.log('pdfjsLib:', typeof pdfjsLib, 'mammoth:', typeof mammoth, 'XLSX:', typeof XLSX);
    
    if (typeof pdfjsLib !== 'undefined' && typeof mammoth !== 'undefined' && typeof XLSX !== 'undefined') {
        console.log('All libs loaded immediately');
        resolve();
    } else {
        var checkCount = 0;
        var maxChecks = 600; // 60 seconds max (CDN might be slow)
        var interval = setInterval(function() {
            checkCount++;
            var missing = [];
            if (typeof pdfjsLib === 'undefined') missing.push('pdfjsLib');
            if (typeof mammoth === 'undefined') missing.push('mammoth');
            if (typeof XLSX === 'undefined') missing.push('XLSX');
            
            if (typeof pdfjsLib !== 'undefined' && typeof mammoth !== 'undefined' && typeof XLSX !== 'undefined') {
                clearInterval(interval);
                console.log('All libs loaded via polling');
                resolve();
            } else if (checkCount >= maxChecks) {
                clearInterval(interval);
                console.warn('Libs timeout, missing:', missing.join(', '));
                resolve(); // Resolve anyway after timeout
            }
        }, 100);
    }
}).then(function() {
    libsReady = true;
    updateSendBtn();
    console.log('libsReady set to true');
});

// Global state: libs loaded + files being processed
var libsReady = false;
var fileProcessingCount = 0;

var _libsLoaded;
try {
    _libsLoaded = (typeof libsLoaded !== 'undefined' && libsLoaded && typeof libsLoaded.then === 'function') ? libsLoaded : Promise.resolve();
} catch(e) {
    _libsLoaded = Promise.resolve();
}

function handleFileSelect(files, isImage) {
    console.log('[FileUpload] handleFileSelect called, isImage:', isImage, 'files:', files, 'type:', typeof files);
    
    if (!files) {
        console.warn('[FileUpload] No files provided');
        return;
    }
    
    // Convert FileList to array
    var fileList = Array.isArray(files) ? files : Array.prototype.slice.call(files);
    console.log('[FileUpload] File count:', fileList.length);
    
    if (!fileList.length) {
        console.log('[FileUpload] Empty file list, returning');
        return;
    }
    
    fileProcessingCount += fileList.length;
    updateSendBtn();
    console.log('[FileUpload] fileProcessingCount:', fileProcessingCount);

    var completedCount = 0;
    var totalFiles = fileList.length;

    function onFileDone() {
        completedCount++;
        fileProcessingCount--;
        if (fileProcessingCount < 0) fileProcessingCount = 0;
        console.log('[FileUpload] onFileDone:', completedCount, '/', totalFiles, 'remaining:', fileProcessingCount);
        updateSendBtn();
    }

    // Process files immediately - no need to wait for libs
    for (var i = 0; i < fileList.length; i++) {
        var f = fileList[i];
        console.log('[FileUpload] Processing file', i + 1, ':', f.name, 'type:', f.type, 'size:', f.size);
        var fileName = f.name;
        if (f.type && f.type.indexOf('image') === 0) {
            var reader = new FileReader();
            reader.onload = function(e) {
                console.log('[FileUpload] Image loaded:', fileName);
                pendingAttachments.push({name: fileName, type: f.type, dataUrl: e.target.result, isFile: false, processing: false});
                renderAttachments();
                onFileDone();
            };
            reader.onerror = function() {
                console.log('[FileUpload] Image read error:', fileName);
                pendingAttachments.push({name: fileName, type: f.type, dataUrl: e.target.result, isFile: false, processing: false, extractError: '图片读取失败'});
                renderAttachments();
                onFileDone();
            };
            reader.readAsDataURL(f);
        } else {
            console.log('[FileUpload] Non-image file:', fileName, 'type:', f.type);
            processSingleFile(f, fileName, onFileDone);
        }
    }
}

function processSingleFile(f, fileName, onDone) {
    var ext = fileName.split('.').pop().toLowerCase();
    var fileSizeKB = Math.round(f.size / 1024);
    var idx = pendingAttachments.push({name: fileName, type: f.type || 'unknown', dataUrl: null, isFile: true, size: fileSizeKB, processing: true}) - 1;
    var targetIdx = idx;
    var extSupported = false;

    var _setExtractedTextDone = false;
    function setExtractedText(text, error) {
        console.log('[FileParse] setExtractedText called for:', fileName, 'hasText:', !!text, 'error:', error);
        if (_setExtractedTextDone) {
            console.log('[FileParse] setExtractedText already done for:', fileName, ', skipping');
            return;
        }
        _setExtractedTextDone = true;
        
        if (error) {
            pendingAttachments[targetIdx] = {name: fileName, type: f.type || 'unknown', dataUrl: null, isFile: true, size: fileSizeKB, extractError: error, processing: false};
            console.error('File parse error:', fileName, error);
            toast('文件解析失败: ' + error, 'error');
        } else if (text) {
            var extracted = (text || '');
            console.log('[FileParse] Storing extracted text, length:', extracted.length);
            pendingAttachments[targetIdx] = {name: fileName, type: f.type || 'unknown', dataUrl: null, isFile: true, size: fileSizeKB, extractedText: extracted.substring(0, 50000), processing: false};
        } else {
            // text is null or empty string and no error - treat as failure
            pendingAttachments[targetIdx] = {name: fileName, type: f.type || 'unknown', dataUrl: null, isFile: true, size: fileSizeKB, extractError: '未能提取到文本内容（可能是扫描件/图片或空白文件）', processing: false};
            console.warn('[FileParse] No text extracted for:', fileName);
        }
        renderAttachments();
        onDone();
    }

    // PDF files: extract text with pdf.js
    if (ext === 'pdf' && typeof pdfjsLib !== 'undefined') {
        extSupported = true;
        console.log('Processing PDF with pdf.js:', fileName);
        var pdfReader = new FileReader();
        pdfReader.onload = function(event) {
            try {
                var typedArray = new Uint8Array(event.target.result);
                var timeout = setTimeout(function() {
                    setExtractedText(null, 'PDF 提取超时，文件可能过大');
                }, 120000); // 120秒超时，支持大文件
                var parsedPages = 0;
                var failedPages = 0;
                var totalFailedText = '';
                var pageBatchSize = 10; // 每10页为一批次，释放主线程
                pdfjsLib.getDocument({data: typedArray}).promise.then(function(pdf) {
                    clearTimeout(timeout);
                    var totalPageCount = pdf.numPages;
                    console.log('[FileParse] PDF total pages:', totalPageCount);
                    // 限制解析页数，避免过长等待
                    var maxPages = Math.min(totalPageCount, 100);
                    var savedFullText = '';
                    // 顺序解析：每 batch 页后让出主线程
                    function processBatch() {
                        var batchStart = parsedPages + 1;
                        var batchEnd = Math.min(batchStart + pageBatchSize - 1, maxPages);
                        var chain = Promise.resolve();
                        for (var num = batchStart; num <= batchEnd; num++) {
                            chain = chain.then(function(pNum) {
                                return pdf.getPage(pNum).then(function(page) {
                                    return page.getTextContent();
                                }).then(function(textContent) {
                                    var pageText = textContent.items.map(function(item) {
                                        return item.str;
                                    }).filter(function(s){ return s && s.trim(); }).join(' ');
                                    savedFullText += pageText + '\n';
                                    parsedPages++;
                                }).catch(function(pageErr) {
                                    failedPages++;
                                    var errMsg = '第' + pNum + '页:' + (pageErr && pageErr.message ? pageErr.message : String(pageErr));
                                    totalFailedText += errMsg + '; ';
                                    console.warn('[FileParse] PDF page', pNum, 'failed:', pageErr);
                                    parsedPages++;
                                });
                            }.bind(null, num));
                        }
                        return chain.then(function() {
                            // 进度反馈
                            if (parsedPages % 10 === 0 || parsedPages === maxPages) {
                                console.log('[FileParse] PDF progress:', parsedPages, '/', maxPages, 'pages, text length:', savedFullText.length);
                            }
                            if (parsedPages < maxPages) {
                                // 还有剩余页面，让出主线程后继续
                                setTimeout(processBatch, 0);
                            } else {
                                // 全部完成
                                if (failedPages > 0) {
                                    savedFullText += '\n\n[注: 共' + totalPageCount + '页，成功解析' + (parsedPages - failedPages) + '页，失败' + failedPages + '页]\n';
                                    if (totalFailedText.length > 500) {
                                        totalFailedText = totalFailedText.substring(0, 500) + '...(仅显示前500字符)';
                                    }
                                    savedFullText += '失败原因: ' + totalFailedText;
                                }
                                if (savedFullText.trim().length > 0) {
                                    setExtractedText(savedFullText);
                                } else {
                                    setExtractedText(null, 'PDF 所有页面均解析失败（可能是扫描件/图片型PDF）');
                                }
                            }
                        });
                    }
                    processBatch();
                }).catch(function(err) {
                    clearTimeout(timeout);
                    console.error('PDF extraction error:', err);
                    setExtractedText(null, 'PDF 提取失败: ' + err.message);
                });
            } catch(err) {
                console.error('PDF read error:', err);
                setExtractedText(null, 'PDF 读取失败: ' + err.message);
            }
        };
        pdfReader.onerror = function() { setExtractedText(null, 'PDF 读取失败'); };
        pdfReader.readAsArrayBuffer(f);
    // DOCX files: extract text with mammoth
    } else if ((ext === 'docx') && (typeof mammoth !== 'undefined')) {
        extSupported = true;
        console.log('[FileParse] DOCX detected, mammoth:', typeof mammoth, 'name:', fileName);
        var docxReader = new FileReader();
        docxReader.onload = function(event) {
            console.log('[FileParse] DOCX loaded, calling mammoth');
            try {
                var timeout = setTimeout(function() {
                    setExtractedText(null, 'DOCX 提取超时');
                }, 30000);
                mammoth.extractRawText({arrayBuffer: event.target.result}).then(function(result) {
                    clearTimeout(timeout);
                    console.log('[FileParse] DOCX extracted, length:', (result.value || '').length, 'messages:', result.messages.length);
                    var text = result.value || '';
                    var warnings = [];
                    // 检查是否有图片等无法提取的元素
                    for (var mi = 0; mi < result.messages.length; mi++) {
                        var msg = result.messages[mi].message;
                        if (msg.indexOf('image') !== -1 || msg.indexOf('picture') !== -1) {
                            if (warnings.indexOf('图片') === -1) warnings.push('图片');
                        }
                        if (msg.indexOf('table') !== -1) {
                            if (warnings.indexOf('表格') === -1) warnings.push('表格');
                        }
                        if (msg.indexOf('style') !== -1 || msg.indexOf('formatting') !== -1) {
                            if (warnings.indexOf('格式') === -1) warnings.push('格式');
                        }
                    }
                    if (warnings.length > 0) {
                        text += '\n\n[注意: 文档中包含' + warnings.join('、') + '等特殊元素，已提取可读取的文本内容]';
                    }
                    if (text.trim()) {
                        setExtractedText(text);
                    } else {
                        // 文档可能是纯图片/扫描件，无法提取文本
                        setExtractedText(null, '文档可能为纯图片/扫描件，无法提取文本内容');
                    }
                }).catch(function(err) {
                    clearTimeout(timeout);
                    console.error('[FileParse] DOCX extraction error:', err);
                    setExtractedText(null, 'DOCX 提取失败: ' + err.message);
                });
            } catch(err) {
                console.error('[FileParse] DOCX read error:', err);
                setExtractedText(null, 'DOCX 读取失败: ' + err.message);
            }
        };
        docxReader.onerror = function() { setExtractedText(null, 'DOCX 读取失败'); };
        docxReader.readAsArrayBuffer(f);
    // DOC files (legacy): fallback to binary
    } else if (ext === 'doc' && typeof mammoth !== 'undefined') {
        extSupported = true;
        console.log('[FileParse] DOC detected (legacy), trying mammoth');
        var docReader = new FileReader();
        docReader.onload = function(event) {
            console.log('[FileParse] DOC loaded, calling mammoth');
            try {
                var timeout = setTimeout(function() {
                    setExtractedText(null, 'DOC 提取超时');
                }, 30000);
                mammoth.extractRawText({arrayBuffer: event.target.result}).then(function(result) {
                    clearTimeout(timeout);
                    console.log('[FileParse] DOC extracted, length:', (result.value || '').length);
                    var text = result.value || '';
                    setExtractedText(text);
                }).catch(function(err) {
                    clearTimeout(timeout);
                    console.error('[FileParse] DOC extraction error:', err);
                    setExtractedText(null, 'DOC 提取失败: ' + err.message);
                });
            } catch(err) {
                console.error('[FileParse] DOC read error:', err);
                setExtractedText(null, 'DOC 读取失败: ' + err.message);
            }
        };
        docReader.onerror = function() { setExtractedText(null, 'DOC 读取失败'); };
        docReader.readAsArrayBuffer(f);
    // XLSX/CSV files: extract text with SheetJS
    } else if ((ext === 'xlsx' || ext === 'xls' || ext === 'csv') && (typeof XLSX !== 'undefined')) {
        extSupported = true;
        console.log('[FileParse] XLSX/CSV detected, XLSX:', typeof XLSX, 'name:', fileName, 'ext:', ext);
        var xlsReader = new FileReader();
        xlsReader.onload = function(event) {
            console.log('[FileParse] Excel loaded, calling SheetJS');
            try {
                var timeout = setTimeout(function() {
                    setExtractedText(null, 'Excel 提取超时');
                }, 30000);
                var data = new Uint8Array(event.target.result);
                var workbook = XLSX.read(data, {type: 'array', defval: ''});
                console.log('[FileParse] Excel workbook loaded, sheets:', workbook.SheetNames);
                var allText = '';
                var hasContent = false;
                workbook.SheetNames.forEach(function(sname) {
                    var sheet = workbook.Sheets[sname];
                    allText += '=== ' + sname + ' ===\n';
                    // 使用 sheet_to_json 获取带表头的结构化数据
                    var json = XLSX.utils.sheet_to_json(sheet, {header: 1, blankrows: false, defval: ''});
                    if (json.length > 0) {
                        // 输出表头
                        allText += json[0].join('\t') + '\n';
                        hasContent = true;
                        // 输出数据行（过滤掉真正的空行）
                        for (var ri = 1; ri < json.length; ri++) {
                            var row = json[ri];
                            if (row && row.length > 0) {
                                // 检查这一行是否至少有一个非空单元格
                                var hasData = false;
                                for (var ci = 0; ci < row.length; ci++) {
                                    if (row[ci] !== '' && row[ci] !== null && row[ci] !== undefined) {
                                        hasData = true;
                                        break;
                                    }
                                }
                                if (hasData) {
                                    allText += row.map(function(c) { return c !== null && c !== undefined ? String(c) : ''; }).join('\t') + '\n';
                                    hasContent = true;
                                }
                            }
                        }
                    }
                    allText += '\n';
                });
                clearTimeout(timeout);
                if (!hasContent) {
                    setExtractedText(null, 'Excel 文件中没有可提取的文本数据（可能包含图片或空白工作表）');
                } else {
                    console.log('[FileParse] Excel extracted, length:', allText.length);
                    setExtractedText(allText);
                }
            } catch(err) {
                console.error('[FileParse] Excel extraction error:', err);
                setExtractedText(null, 'Excel 提取失败: ' + err.message);
            }
        };
        xlsReader.onerror = function() { setExtractedText(null, 'Excel 读取失败'); };
        xlsReader.readAsArrayBuffer(f);
    // Text files
    } else if (f.type && f.type.indexOf('text') === 0) {
        extSupported = true;
        console.log('Processing text file:', fileName);
        var txtReader = new FileReader();
        txtReader.onload = function(e) { setExtractedText(e.target.result); };
        txtReader.onerror = function() { setExtractedText(null, '文件读取失败'); };
        txtReader.readAsText(f);
    } else if (f.type === 'application/csv' || (fileName && fileName.endsWith('.csv'))) {
        extSupported = true;
        console.log('Processing CSV file:', fileName);
        var csvReader = new FileReader();
        csvReader.onload = function(e) { setExtractedText(e.target.result); };
        csvReader.onerror = function() { setExtractedText(null, 'CSV 读取失败'); };
        csvReader.readAsText(f);
    } else if (f.type === 'application/json' || (fileName && fileName.endsWith('.json'))) {
        extSupported = true;
        console.log('Processing JSON file:', fileName);
        var jsonReader = new FileReader();
        jsonReader.onload = function(e) { setExtractedText(e.target.result); };
        jsonReader.onerror = function() { setExtractedText(null, 'JSON 读取失败'); };
        jsonReader.readAsText(f);
    } else if (f.type === 'application/xml' || (fileName && fileName.endsWith('.xml'))) {
        extSupported = true;
        console.log('Processing XML file:', fileName);
        var xmlReader = new FileReader();
        xmlReader.onload = function(e) { setExtractedText(e.target.result); };
        xmlReader.onerror = function() { setExtractedText(null, 'XML 读取失败'); };
        xmlReader.readAsText(f);
    } else if (f.type === 'application/javascript' || (fileName && (fileName.endsWith('.js') || fileName.endsWith('.ts')))) {
        extSupported = true;
        console.log('Processing code file:', fileName);
        var codeReader = new FileReader();
        codeReader.onload = function(e) { setExtractedText(e.target.result); };
        codeReader.onerror = function() { setExtractedText(null, '代码文件读取失败'); };
        codeReader.readAsText(f);
    // Fallback
    } else {
        console.log('[FileParse] Fallback mode for file:', fileName, 'type:', f.type, 'ext:', ext, 'mammoth:', typeof mammoth, 'XLSX:', typeof XLSX);
        if (!extSupported) {
            // No recognized file type handler found, treat as binary
            console.warn('[FileParse] Unrecognized file extension:', ext, 'using fallback');
        }
        var fallbackReader = new FileReader();
        fallbackReader.onload = function(e) {
            pendingAttachments[targetIdx] = {name: fileName, type: f.type || 'application/octet-stream', dataUrl: e.target.result, isFile: true, size: fileSizeKB, processing: false};
            renderAttachments();
            onDone();
        };
        fallbackReader.onerror = onDone;
        fallbackReader.readAsDataURL(f);
    }
}

function renderAttachments() {
    var container = document.getElementById("chatAttachments");
    container.innerHTML = '';
    for (var i = 0; i < pendingAttachments.length; i++) {
        var a = pendingAttachments[i];
        var el = document.createElement('span');
        el.className = 'chat-attachment';
        if (a.processing) {
            // 解析中：不显示文件名，只显示"解析中..."
            el.innerHTML = '⏳ 解析中... <span class="remove" data-idx="' + i + '">✕</span>';
        } else {
            var statusText = a.extractError ? ' (解析失败)' : '';
            var titleText = a.extractError ? '错误：' + a.extractError : '';
            el.innerHTML = (a.isFile ? '📎 ' : '🖼 ') + a.name + statusText + ' <span class="remove" data-idx="' + i + '">✕</span>';
            if (titleText) {
                el.title = titleText;
            }
        }
        container.appendChild(el);
    }
    container.querySelectorAll('.remove').forEach(function(btn) {
        btn.onclick = function() {
            pendingAttachments.splice(parseInt(this.getAttribute('data-idx')), 1);
            renderAttachments();
        };
    });
    updateSendBtn();
}

function updateSendBtn() {
    var sendBtn = document.getElementById("chatSend");
    var hasProcessing = fileProcessingCount > 0 || pendingAttachments.some(function(a) { return a.processing; });
    sendBtn.disabled = hasProcessing;
    sendBtn.style.opacity = hasProcessing ? '0.5' : '1';
    sendBtn.style.cursor = hasProcessing ? 'not-allowed' : 'pointer';
    sendBtn.title = hasProcessing ? '文件解析中，请稍候' : '发送消息';
}
