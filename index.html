var _origSend = sendChat;

var isSending = false;

async function sendChat() {
    if (isSending) return;
    isSending = true;
    
    var sendBtn = document.getElementById("chatSend");
    if (sendBtn) { sendBtn.disabled = true; sendBtn.style.opacity = "0.5"; }
    
    var input = document.getElementById("chatInput");
    var content = input.value.trim();
    if (!content && pendingAttachments.length === 0) {
        isSending = false;
        if (sendBtn) { sendBtn.disabled = false; sendBtn.style.opacity = "1"; }
        return;
    }
    if (!C.apiKey) {
        isSending = false;
        if (sendBtn) { sendBtn.disabled = false; sendBtn.style.opacity = "1"; }
        return toast("请输入 API Key", "error");
    }
    
    // Only block if files are still being processed (no need to wait for libs)
    if (fileProcessingCount > 0) {
        isSending = false;
        if (sendBtn) { sendBtn.disabled = false; sendBtn.style.opacity = "1"; }
        return toast("文件解析中，请稍候...", "error");
    }
    
    // Build user message display text with HTML for images
    var displayHtml = '';
    for (var i = 0; i < pendingAttachments.length; i++) {
        var a = pendingAttachments[i];
        if (a.isFile) {
            displayHtml += '<p style="margin:2px 0">📎 ' + escapeHtml(a.name) + '</p>';
        } else if (a.dataUrl && a.dataUrl.indexOf('image') !== -1) {
            displayHtml += '<img src="' + a.dataUrl + '" style="max-width:200px;border-radius:8px;margin:4px 0;display:block;">';
        }
    }
    if (content) {
        displayHtml += (displayHtml ? '<br>' : '') + escapeHtml(content);
    }
    
    addChatMsg("user", displayHtml, true);
    
    // Save current content and attachments for history before clearing
    var savedContent = content;
    var savedAttachments = JSON.parse(JSON.stringify(pendingAttachments));
    
    // Add thinking bubble in chat immediately
    var container = document.getElementById("chatMessages");
    var thinkingDiv = document.createElement("div");
    thinkingDiv.className = "chat-msg assistant";
    thinkingDiv.id = "thinkingBubble";
    var thinkingAvatar = document.createElement("div");
    thinkingAvatar.className = "chat-avatar";
    thinkingAvatar.textContent = "🤖";
    var thinkingBubble = document.createElement("div");
    thinkingBubble.className = "chat-bubble";
    thinkingBubble.innerHTML = '<span class="thinking-dots"><span></span><span></span><span></span></span> 思考中';
    thinkingDiv.appendChild(thinkingAvatar);
    thinkingDiv.appendChild(thinkingBubble);
    container.appendChild(thinkingDiv);
    container.scrollTop = container.scrollHeight;
    
    // Build messages array for API history
    // Keep all content as strings to avoid array format issues with API
    var apiMessages = [];
    for (var j = 0; j < chatHistory.length; j++) {
        var msg = chatHistory[j];
        apiMessages.push({role: msg.role, content: msg.content});
    }
    
    var status = document.getElementById("chatStatus");
    if (status) status.textContent = "";
    
    // Double-check processing flag one last time
    var waitForFiles = new Promise(function(resolve) {
        var hasProcessing = pendingAttachments.some(function(a) { return a.processing; });
        if (!hasProcessing) {
            resolve();
            return;
        }
        var checkInterval = setInterval(function() {
            var hasProcessing = pendingAttachments.some(function(a) { return a.processing; });
            if (!hasProcessing) {
                clearInterval(checkInterval);
                resolve();
            }
        }, 100);
        // Timeout after 120 seconds (supports large PDFs)
        setTimeout(function() {
            clearInterval(checkInterval);
            console.log('[SendChat] waitForFiles timeout, continuing with current state');
            resolve();
        }, 120000);
    });
    
    await waitForFiles;
    
    // Re-read attachments after processing completes to get updated data
    var finalAttachments = JSON.parse(JSON.stringify(pendingAttachments));
    console.log('[SendChat] Final attachments:', JSON.stringify(finalAttachments, null, 2));
    for (var i = 0; i < finalAttachments.length; i++) {
        var fa = finalAttachments[i];
        console.log('[SendChat] File', i + 1, ':', fa.name, 'isFile:', fa.isFile, 'extractedText:', fa.extractedText ? 'present(' + fa.extractedText.length + ' chars)' : '(empty/null)', 'extractError:', fa.extractError, 'processing:', fa.processing);
    }
    
    // Clear input and attachments (always clear after send attempt)
    input.value = "";
    input.style.height = '42px';
    var btn = document.querySelector('.chat-send');
    if (btn) btn.style.height = '42px';
    pendingAttachments = [];
    renderAttachments();
    
    try {
        var resp;
        
        // If there are attachments, use multipart/form-data to send them
        var hasImages = finalAttachments.some(function(a) { return !a.isFile && a.dataUrl; });
        var hasFiles = finalAttachments.some(function(a) { return a.isFile; });
        
        // Determine actual content parts for API
        var useMultipart = hasImages || hasFiles;
        
        if (useMultipart && !hasImages) {
            // Build content as single string for non-image files
            var multiContent = content || '';
            
            // File parts (extract text content for non-image files)
            for (var i = 0; i < finalAttachments.length; i++) {
                var a = finalAttachments[i];
                if (a.isFile) {
                    // Use extracted text if available
                    if (a.extractedText) {
                        var maxLen = 50000;
                        if (a.extractedText.length > maxLen) {
                            multiContent += '（' + a.name + ' 文件内容截断至前 ' + maxLen + ' 字符）\n\n';
                            multiContent += a.extractedText.substring(0, maxLen);
                        } else {
                            multiContent += '=== ' + a.name + ' 文件内容 ===\n\n';
                            multiContent += a.extractedText;
                        }
                        multiContent += '\n\n';
                    } else if (a.extractError) {
                        multiContent += '[文件「' + a.name + '」提取失败: ' + a.extractError + '（请确认文件不是扫描件或图片）】\n\n';
                    } else if (a.dataUrl) {
                        // Fallback: try to decode as text from base64
                        try {
                            var commaIdx2 = a.dataUrl.indexOf(',');
                            if (commaIdx2 > 0) {
                                var fallbackText = atob(a.dataUrl.substring(commaIdx2 + 1));
                                if (fallbackText && fallbackText.length > 0) {
                                    multiContent += '=== ' + a.name + ' 文件内容 ===\n\n';
                                    multiContent += fallbackText.substring(0, 50000);
                                    multiContent += '\n\n';
                                } else {
                                    multiContent += '[文件「' + a.name + '」未能提取到文本内容（可能是扫描件/图片或空白文件）]\n\n';
                                }
                            } else {
                                multiContent += '[文件「' + a.name + '」未能提取到文本内容（可能是扫描件/图片或空白文件）]\n\n';
                            }
                        } catch(e2) {
                            multiContent += '[文件「' + a.name + '」未能提取到文本内容（可能是扫描件/图片或空白文件）]\n\n';
                        }
                    } else {
                        multiContent += '[文件「' + a.name + '」未能提取到文本内容（可能是扫描件/图片或空白文件）]\n\n';
                    }
                }
            }
            
            // If no user content, add explicit instruction for AI to analyze the file
            if (!content || !content.trim()) {
                if (multiContent) {
                    multiContent = '请分析以下文件内容，并基于内容给出详细回复：\n\n' + multiContent;
                } else {
                    multiContent = '请分析以下文件内容，并基于内容给出详细回复：\n\n[没有文件内容]';
                }
            }
            
            console.log('[SendChat] Sending file content to API, length:', multiContent.length);
            
            // Add current message
            apiMessages.push({role: "user", content: multiContent});
            
            var body = {
                model: C.chatModel,
                messages: apiMessages,
                stream: false
            };
            
            console.log('[SendChat] API request body:', JSON.stringify(body, null, 2).substring(0, 2000) + '...');
            
            resp = await apiFetch(C.chatApiUrl, {
                method: "POST",
                headers: {"Content-Type": "application/json", "Authorization": "Bearer " + C.apiKey},
                body: JSON.stringify(body)
            }, 120000);
        } else if (useMultipart && hasImages) {
            // Build content parts for image messages (multimodal)
            var contentParts = [];
            
            // Text content (even if empty, text may be absent)
            if (content) {
                contentParts.push({type: "text", text: content});
            }
            
            // Image parts (base64 from dataUrl)
            for (var i = 0; i < finalAttachments.length; i++) {
                var a = finalAttachments[i];
                if (!a.isFile && a.dataUrl) {
                    // Extract MIME type and base64 from dataUrl
                    var fullDataUrl = a.dataUrl;
                    var base64Data = fullDataUrl;
                    var mimeType = 'image/png';
                    var prefixMatch = fullDataUrl.match(/^data:([a-zA-Z]+\/[a-zA-Z0-9+.]+);base64,/);
                    if (prefixMatch) {
                        mimeType = prefixMatch[1];
                        var commaIdx = fullDataUrl.indexOf(',');
                        if (commaIdx > 0) {
                            base64Data = fullDataUrl.substring(commaIdx + 1);
                        }
                    }
                    contentParts.push({type: "image_url", image_url: {url: "data:" + mimeType + ";base64," + base64Data}});
                }
            }
            
            // If no content parts were added, add a fallback text
            if (contentParts.length === 0) {
                var fallbackDesc = '[请解析并回复附件内容]';
                contentParts.push({type: "text", text: fallbackDesc});
            }
            
            // Add current message with multimodal content
            apiMessages.push({role: "user", content: contentParts});
            
            var body = {
                model: C.chatModel,
                messages: apiMessages,
                stream: false
            };
            
            resp = await apiFetch(C.chatApiUrl, {
                method: "POST",
                headers: {"Content-Type": "application/json", "Authorization": "Bearer " + C.apiKey},
                body: JSON.stringify(body)
            }, 120000);
            
        } else {
            // Text only or binary file (unknown type, no extraction) - send as text with attachment note
            var attachmentNote = '';
            if (finalAttachments.length > 0) {
                attachmentNote = '[附件: ' + finalAttachments.map(function(a){return a.name;}).join(', ') + ']';
            }
            if (content) {
                apiMessages.push({role: "user", content: content});
            } else if (attachmentNote) {
                apiMessages.push({role: "user", content: attachmentNote});
            }
            
            var body = {
                model: C.chatModel,
                messages: apiMessages,
                stream: false
            };
            
            resp = await apiFetch(C.chatApiUrl, {
                method: "POST",
                headers: {"Content-Type": "application/json", "Authorization": "Bearer " + C.apiKey},
                body: JSON.stringify(body)
            }, 120000);
        }
        
        if (!resp.ok) {
            var et = await resp.text();
            console.error('[SendChat] API error response:', et);
            var em;
            try { em = JSON.parse(et).error.message || JSON.parse(et).error || et; } catch(e) { em = et; }
            throw new Error(em);
        }
        
        var data = await resp.json();
        console.log('[SendChat] API response:', JSON.stringify(data, null, 2).substring(0, 2000));
        var reply = data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content : "未收到有效回复";
        console.log('[SendChat] Extracted reply length:', reply ? reply.length : 0);
        
        // Save to history with full file content for multi-turn context
        var userHistoryContent = content;
        if (!userHistoryContent && finalAttachments.length > 0) {
            // Reconstruct file content for history
            var historyParts = [];
            for (var i = 0; i < finalAttachments.length; i++) {
                var fa = finalAttachments[i];
                if (fa.isFile && fa.extractedText) {
                    historyParts.push('[文件: ' + fa.name + ']\n' + fa.extractedText.substring(0, 50000));
                } else if (fa.isFile) {
                    historyParts.push('[文件: ' + fa.name + '（无文本内容）]');
                }
            }
            userHistoryContent = historyParts.join('\n\n');
        }
        if (!userHistoryContent) {
            userHistoryContent = content || '[附件: ' + finalAttachments.map(function(a){return a.name;}).join(', ') + ']';
        }
        chatHistory.push({role: "user", content: userHistoryContent});
        chatHistory.push({role: "assistant", content: reply});
        
        var bubbleEl = addChatMsg("assistant", reply);
        typewriterEffect(bubbleEl, reply, function() {
            var tb = document.getElementById("thinkingBubble");
            if (tb) tb.remove();
            var sendBtn = document.getElementById("chatSend");
            if (sendBtn) { sendBtn.disabled = false; sendBtn.style.opacity = "1"; }
            isSending = false;
        });
        var thinkingBubble2 = document.getElementById("thinkingBubble");
        if (thinkingBubble2) thinkingBubble2.remove();
        status.textContent = "";
        
    } catch (err) {
        var thinkingBubble3 = document.getElementById("thinkingBubble");
        if (thinkingBubble3) thinkingBubble3.remove();
        status.textContent = "错误";
        // 发送失败也清除附件（已尝试过）
        pendingAttachments = [];
        renderAttachments();
        toast(friendlyErr(err), "error");
        // 发送失败，也恢复按钮和锁
        var sendBtn = document.getElementById("chatSend");
        if (sendBtn) { sendBtn.disabled = false; sendBtn.style.opacity = "1"; }
        isSending = false;
    }
}

function extractVidUrl(res){

  var v=res[keys[i]];

}

}

var _pv=1;document.addEventListener("visibilitychange",function(){_pv=document.hidden?0:1;});

// Resume pending video on load
async function resumePendingVideo(){var raw=localStorage.getItem("agnes-pending-video");if(!raw)return;var task;try{task=JSON.parse(raw);}catch(e){clearPendingVideo();return;}var st=document.getElementById("vidStatus"),pg=document.getElementById("vidProgress"),fl=pg.querySelector(".progress-fill"),btn=document.getElementById("vidGenerate");btn.disabled=true;pg.style.display="block";fl.style.width="35%";toast("正在恢复未完成的视频任务","success");try{var maxW=900000,iv=10000,vUrl=null,errCount=0,consecTimeout=0,t0=task.t0||Date.now(),qUrl=task.qUrl;if(!qUrl){clearPendingVideo();return;}while(Date.now()-t0<maxW){await new Promise(function(r){setTimeout(r,_pv?iv:Math.max(iv,8000));});var el=Math.round((Date.now()-t0)/1000);st.innerHTML='<span class="spinner"></span>恢复处理中... ('+el+' 秒)';fl.style.width=(35+Math.min(55,Math.min(el,300)/300*55))+"%";try{var pr=await apiFetch(qUrl,{method:"GET",headers:{"Authorization":"Bearer "+C.apiKey}},180000);if(!pr.ok){var errText="";try{var ej=await pr.json();errText=ej.error||ej.message||JSON.stringify(ej);}catch(e2){errText="HTTP "+pr.status;}consecTimeout++;if(consecTimeout>=5)throw new Error("请求过于频繁(429)，连续失败 "+consecTimeout+" 次，请稍后再试");errCount++;if(errCount>=10)throw new Error("轮询连续失败 "+errCount+" 次，HTTP "+pr.status+" "+errText);continue;}consecTimeout=0;errCount=0;var res=await pr.json();var s=String(res.status||res.state||res.task_status||res.result&&res.result.status||"").toLowerCase();var pct=res.progress||0;if(s==="completed"||s==="succeeded"||s==="success"||s==="done"){vUrl=res.video_url||res.url||res.result&&res.result.video_url||res.result&&res.result.url||res.data&&res.data.video_url||res.data&&res.data.url||"";break;}if(s==="failed"||s==="error"||res.error)throw new Error(res.error&&res.error.message||res.error||"生成失败");if(pct>=100&&!vUrl){var fb=res.video_url||res.url||"";if(fb){vUrl=fb;break;}}}catch(e2){if(e2&&e2.name==="AbortError"||e2&&e2.message&&e2.message.indexOf("abort")>=0){consecTimeout++;if(consecTimeout>=10)throw new Error("轮询连续超时 "+consecTimeout+" 次，请检查网络或 API 是否正常");continue;}throw e2;}}if(!vUrl)throw new Error("恢复任务超时");clearPendingVideo();vidR=[{id:Date.now(),type:"video",url:vUrl,prompt:task.prompt||"",model:task.model||C.vidModel,duration:(task.nf/task.fr).toFixed(1)+" 秒",size:task.w+"x"+task.h,mode:task.mode||"resume",timestamp:new Date().toLocaleString()}].concat(vidR);if(vidR.length>50)vidR=vidR.slice(0,50);saveR("vid",vidR);renderG("vid",vidR);st.textContent="恢复完成";toast("视频任务已恢复完成","success");}catch(err){st.textContent="";toast(friendlyErr(err),"error");}finally{btn.disabled=false;setTimeout(function(){pg.style.display="none";fl.style.width="0";},800);}}

// === 页面访问密码 ===
var config = window.__AGNES_CONFIG__ || {};
var hasPassword = config.accessPassword && config.accessPassword.length > 0;
var hasDefaultKey = config.defaultApiKey && config.defaultApiKey.length > 0;

if (hasPassword) {
  var stored = sessionStorage.getItem('agnes-auth');
  if (stored !== 'true') {
    document.getElementById('loginOverlay').style.display = 'block';
    document.querySelector('.container').style.display = 'none';
  }
  document.getElementById('loginBtn').onclick = function() {
    var pw = document.getElementById('loginPassword').value;
    if (pw === config.accessPassword) {
      sessionStorage.setItem('agnes-auth', 'true');
      document.getElementById('loginOverlay').style.display = 'none';
      document.querySelector('.container').style.display = 'block';
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('loginPassword').value = '';
    }
  };
  document.getElementById('loginPassword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });
}

// === 默认 API Key 注入 ===
if (hasDefaultKey) {
  document.getElementById('apiKeyInput').value = hasDefaultKey;
  C.apiKey = hasDefaultKey;
  saveC(C);
}

document.getElementById("imgFilter").onchange=function(){renderG("img",imgR);};
document.getElementById("vidFilter").onchange=function(){renderG("vid",vidR);};

// Code block event delegation
document.addEventListener('click', function(e) {
  var btn = e.target.closest('.code-action-btn');
  if (!btn) return;
  var wrapper = btn.closest('.code-block-wrapper');
  if (!wrapper) return;
  var codeId = wrapper.getAttribute('data-codeid');
  var action = btn.getAttribute('data-action');
  if (action === 'copy') {
    copyCodeBlock(codeId);
  } else if (action === 'toggle') {
    toggleCodeBlock(codeId);
  }
});

renderG("img",imgR);renderG("vid",vidR);
resumePendingVideo();


</script>
